<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Score Arranger</title>
    <style>
      :root {
        font-family:
          -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC",
          "Microsoft JhengHei", Arial, sans-serif;

        /* === Light theme (預設) === */
        --bg-base: #f5f5f7;
        --bg-panel: #ffffff;
        --bg-panel-translucent: rgba(255, 255, 255, 0.9);
        --bg-secondary: #fafafa;
        --bg-tertiary: #f0f0f0;
        --bg-hover: #faf6ec;
        --bg-divider: #ddd;

        --fg-primary: #1d1d1f;
        --fg-secondary: #444;
        --fg-muted: #666;
        --fg-tertiary: #999;

        --border: #ddd;
        --border-light: #eee;
        --border-strong: #ccc;

        --accent: #8c6210;
        --accent-fg: #ffffff;
        --accent-hover: #73500d;

        --error-bg: #ffebee;
        --error-fg: #c62828;
        --error-border: #ef9a9a;

        --warning-fg: #f57c00;
        --success-fg: #388e3c;

        --info-bg: #e3f2fd;
        --info-fg: #1565c0;
        --info-border: #90caf9;

        --button-bg: #ffffff;
        --button-fg: #1d1d1f;
        --button-border: #ccc;
        --button-bg-hover: #f5f5f5;

        --code-bg: rgba(0, 0, 0, 0.05);

        --scrollbar-thumb: rgba(40, 32, 16, 0.22);
        --scrollbar-thumb-hover: rgba(140, 98, 16, 0.65);
      }

      body.dark {
        /* === Dark theme === */
        --bg-base: #1c1c1e;
        --bg-panel: #2c2c2e;
        --bg-panel-translucent: rgba(44, 44, 46, 0.92);
        --bg-secondary: #3a3a3c;
        --bg-tertiary: #2c2c2e;
        --bg-hover: #3a352b;
        --bg-divider: #444;

        --fg-primary: #f5f5f7;
        --fg-secondary: #d0d0d2;
        --fg-muted: #a0a0a3;
        --fg-tertiary: #7a7a7d;

        --border: #444;
        --border-light: #333;
        --border-strong: #555;

        --accent: #d9aa63;
        --accent-fg: #1a1510;
        --accent-hover: #ecc890;

        --error-bg: #4a1c20;
        --error-fg: #ff8a80;
        --error-border: #8a3a40;

        --warning-fg: #ffb74d;
        --success-fg: #81c784;

        --info-bg: #1a3a5c;
        --info-fg: #8ab8e8;
        --info-border: #3a5a8c;

        --button-bg: #3a3a3c;
        --button-fg: #f5f5f7;
        --button-border: #555;
        --button-bg-hover: #4a4a4c;

        --code-bg: rgba(255, 255, 255, 0.08);

        --scrollbar-thumb: rgba(236, 230, 218, 0.17);
        --scrollbar-thumb-hover: rgba(217, 170, 99, 0.6);
      }

      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        background: var(--bg-base);
        color: var(--fg-primary);
        transition: background-color 0.15s ease, color 0.15s ease;
      }

      /* === 捲動軸 — 配合深色 / 金色主題 === */
      ::-webkit-scrollbar {
        width: 11px;
        height: 11px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 6px;
        border: 3px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-corner {
        background: transparent;
      }

      /* OSMD 內容容器一律保持淺色 (避免重新渲染), 透過 wrapper 控制 */
      .osmd-light-wrapper {
        background: #ffffff;
        color: #000000;
      }

      /* 點 Issue 後譜面 flash 動畫: 黃色脈動 → 淡出 */
      @keyframes score-flash {
        0% {
          background: rgba(255, 215, 0, 0.55);
          box-shadow: 0 0 0 3px rgba(255, 165, 0, 0.7);
        }
        40% {
          background: rgba(255, 215, 0, 0.35);
          box-shadow: 0 0 0 2px rgba(255, 165, 0, 0.5);
        }
        100% {
          background: rgba(255, 215, 0, 0);
          box-shadow: 0 0 0 0 rgba(255, 165, 0, 0);
        }
      }
      .score-flash-overlay {
        animation: score-flash 1.5s ease-out forwards;
      }

      /* 播放游標: 半透明綠色小節高亮, 平順滑動跟隨 (取代被深色背景蓋掉的
         OSMD 內建 cursor)。transition 讓游標在小節間平順滑過, 不瞬間跳。 */
      .score-playback-cursor {
        background: rgba(52, 199, 89, 0.16);
        box-shadow: 0 0 0 2px rgba(52, 199, 89, 0.85) inset;
        border-radius: 4px;
        transition:
          left 130ms ease-out,
          top 130ms ease-out,
          width 130ms ease-out,
          height 130ms ease-out;
      }

      /* 持久「選取小節」高亮: 點 issue / 點小節後留著的琥珀色外框 */
      .score-selected-measure {
        background: rgba(255, 179, 0, 0.12);
        box-shadow: 0 0 0 2px rgba(255, 179, 0, 0.9) inset;
        border-radius: 4px;
      }

      /* 載入遮罩的轉圈動畫 */
      @keyframes score-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
