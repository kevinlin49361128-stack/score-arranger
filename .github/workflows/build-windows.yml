name: Build Windows

# Windows binary 必須在 Windows runner 上 build (PyInstaller 不 cross-build).
# 觸發: push tag v* → 同名 GitHub Release 多上 .exe asset.
# 也支援手動 workflow_dispatch (拉 main 最新狀態建).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write  # 需要寫 release assets

jobs:
  build:
    name: Windows .exe + .zip
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install npm deps
        run: npm ci

      - name: Install engine deps
        run: |
          cd engine
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pyinstaller

      - name: Build renderer + main
        run: npm run build

      - name: Freeze Python engine (PyInstaller)
        run: |
          cd engine
          python scripts/freeze.py

      - name: electron-builder (Windows, no publish)
        # CI 把 output 強制改成 repo 內 dist-windows/, 避免 yml 預設的
        # ${env.HOME}/build/... 在 Windows runner 上對應到不可預測位置.
        run: npx electron-builder --win --publish never --config.directories.output=dist-windows

      - name: Show artifact list
        if: always()
        run: |
          if (Test-Path "dist-windows") {
            Get-ChildItem "dist-windows" | Select-Object Name, Length
          }

      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: score-arranger-windows
          path: |
            dist-windows/*.exe
            dist-windows/*.zip
            dist-windows/*.yml
            dist-windows/*.blockmap
          if-no-files-found: warn
          retention-days: 30

      - name: Attach to existing GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $files = Get-ChildItem -Path "dist-windows" `
            -Include *.exe,*.zip,*.yml,*.blockmap `
            -Recurse `
            -ErrorAction SilentlyContinue
          if ($files.Count -eq 0) {
            Write-Host "No artifacts found, skipping release upload."
            exit 0
          }
          # gh release upload 對已存在的 file 會 fail, 用 --clobber 覆蓋
          gh release upload $tag $files.FullName --clobber --repo $env:GITHUB_REPOSITORY
