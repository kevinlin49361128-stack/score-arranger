appId: com.kevinlin.score-arranger
productName: Score Arranger
copyright: Copyright (c) 2026 Score Arranger

directories:
  # 輸出到 ~/build 而非專案內 — 避免 iCloud / Spotlight 對 .app bundle
  # 自動貼 xattr 導致 codesign 失敗 (SAA 專案的教訓)。
  output: ${env.HOME}/build/score-arranger/dist
  buildResources: build

# 只打包編譯產物 —
#   - main process 不 require 任何 node_modules (只用 node:* + electron)
#   - renderer 依賴已由 vite 全數 bundle 進 dist/renderer
# 所以連 node_modules 都不需進 asar。
files:
  - "dist/**"
  - "package.json"
  - "!**/*.map"
  - "!**/*.ts"

# 凍結的 Python engine (PyInstaller onedir) → Contents/Resources/engine/
# python-bridge.ts 在 packaged 模式會 spawn
#   resources/engine/score-arranger-engine/score-arranger-engine
#
# 0.1.33: 法律文件一併放進 Contents/Resources/legal/ — GPL/LGPL §6(a)
# 「accompanying notice」要求在 packaged binary 內就能查到 (不必去找 source
# repo). About Dialog 已連結這些檔案; Finder 也可從「顯示套件內容」進去.
extraResources:
  - from: "engine/build-pyi/dist/score-arranger-engine"
    to: "engine/score-arranger-engine"
  - from: "LICENSE"
    to: "legal/LICENSE"
  - from: "NOTICE.md"
    to: "legal/NOTICE.md"
  - from: "THIRD_PARTY_LICENSES.md"
    to: "legal/THIRD_PARTY_LICENSES.md"
  - from: "PRIVACY.md"
    to: "legal/PRIVACY.md"
  - from: "DISCLAIMER.md"
    to: "legal/DISCLAIMER.md"
  - from: "SOURCE.md"
    to: "legal/SOURCE.md"
  - from: "CONTRIBUTING.md"
    to: "legal/CONTRIBUTING.md"
  - from: "SECURITY.md"
    to: "legal/SECURITY.md"

# 簽章前清 xattr
afterPack: build/after-pack.js

asar: true

# 安全升 Electron 31→42 後, electron-rebuild 會試圖 rebuild OSMD 的 optional
# dep `gl@9.x` (headless WebGL for SSR), 但它的 C++ 不過 Node 22+ ABI 而失敗.
# 這個 app 完全不需要 native node_modules —— main process 只用 node:* +
# electron, Python engine 是獨立的 PyInstaller binary —— 所以禁掉 rebuild
# 既安全又解掉 build break.
npmRebuild: false

mac:
  category: public.app-category.music
  icon: build/icon.icns
  target:
    # zip = 主散佈格式 — notarized .app 可直接 zip 散佈, 不需 DMG 簽章/公證,
    #       且 electron-builder 會產 latest-mac.yml 供 auto-update。
    - target: zip
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # 0.1.35: 麥克風用途說明 — Performance-Following 練習評估需要此權限,
  # 首次使用 Mic Practice 時 macOS 會出系統提示框, 顯示這段文字.
  extendInfo:
    NSMicrophoneUsageDescription: "Score Arranger 需要使用麥克風來分析你的練習音準, 比對改編譜的目標音高. 音訊不會離開你的電腦, 也不會被錄製或上傳."
  # macOS 26 / Xcode 26 的 stapler bug 會讓 electron-builder 內建 staple
  # 噴 Error 65 → 改在 release 腳本手動 `xcrun notarytool submit`。
  notarize: false

# 0.1.36: auto-update via electron-updater. Build 時自動把 latest-mac.yml +
# blockmap 一起送上 GitHub Release, client 端 autoUpdater 會去 latest-mac.yml
# 看 version. 不會送任何 user data — 純 GET 一個 yaml.
publish:
  provider: github
  owner: kevinlin49361128-stack
  repo: score-arranger
  # 預設 channel=latest. 不想 publish (本機 smoke build) 用 PUBLISH=never npm run dist:mac
  releaseType: release

dmg:
  artifactName: "${productName}-${version}-mac.${ext}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: zip
      arch:
        - x64
  artifactName: "${productName}-${version}-win-${arch}.${ext}"
